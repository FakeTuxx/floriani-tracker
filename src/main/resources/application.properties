spring.application.name=floriani-tracker

server.port=${PORT:8080}

# Lokal wird automatisch H2 verwendet.
# Auf Render/Server setzt du SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
# SPRING_DATASOURCE_PASSWORD und SPRING_DATASOURCE_DRIVER=org.postgresql.Driver.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/floriani_tracker}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Für Entwicklung praktisch. Für echte Produktion später besser mit Flyway + validate.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}

# Starter-/Demo-Daten nur lokal aktiv lassen. Auf Render unbedingt APP_DEMO_DATA_ENABLED=false setzen.
app.demo-data.enabled=${APP_DEMO_DATA_ENABLED:true}
app.super-admin.username=${APP_SUPER_ADMIN_USERNAME:admin}
app.super-admin.password=${APP_SUPER_ADMIN_PASSWORD:admin2026}
app.super-admin.display-name=${APP_SUPER_ADMIN_DISPLAY_NAME:System Admin}
